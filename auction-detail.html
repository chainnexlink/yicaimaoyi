<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1440">
    <title data-i18n="auctionDetail.tv3jxrp">竞价详情 - 智能采购反向竞价</title>
    <link rel="stylesheet" href="platform-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .auction-detail-page {
            min-height: 100vh;
            background: var(--bg-dark);
            padding-top: 80px;
        }
        
        .auction-detail-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }
        
        .auction-main {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
        }
        
        .auction-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .auction-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .auction-badge.active {
            background: rgba(0, 229, 204, 0.15);
            color: var(--primary-cyan);
            border: 1px solid var(--primary-cyan);
        }
        
        .auction-badge.pending {
            background: rgba(255, 217, 61, 0.15);
            color: var(--accent-yellow);
            border: 1px solid var(--accent-yellow);
        }
        
        .auction-badge.ended {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }
        
        .auction-detail-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .auction-no {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .auction-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .meta-item {
            background: rgba(0, 229, 204, 0.05);
            border: 1px solid rgba(0, 229, 204, 0.2);
            border-radius: 12px;
            padding: 16px;
        }
        
        .meta-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .meta-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .meta-value.price {
            color: var(--accent-red);
            font-size: 24px;
        }
        
        .auction-desc {
            margin-bottom: 30px;
        }
        
        .auction-desc h3 {
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        
        .auction-desc p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.8;
            white-space: pre-wrap;
        }
        
        .bid-history {
            margin-top: 30px;
        }
        
        .bid-history h3 {
            font-size: 18px;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .bid-count-badge {
            background: var(--primary-cyan);
            color: var(--bg-dark);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .bid-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .bid-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg-darker);
            border-radius: 8px;
            margin-bottom: 8px;
            transition: var(--transition-fast);
        }
        
        .bid-item:hover {
            background: rgba(0, 229, 204, 0.05);
        }
        
        .bid-item.winner {
            border: 2px solid var(--primary-cyan);
            background: rgba(0, 229, 204, 0.1);
        }
        
        .bid-item.lowest {
            border-left: 3px solid var(--primary-cyan);
        }
        
        .bid-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .bid-company {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .bid-time {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .bid-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-red);
        }
        
        .bid-rank {
            font-size: 11px;
            color: var(--primary-cyan);
            margin-top: 4px;
        }
        
        /* 右侧报价面板 */
        .bid-panel {
            position: sticky;
            top: 100px;
        }
        
        .bid-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        
        .countdown-box {
            background: linear-gradient(135deg, rgba(0, 229, 204, 0.1) 0%, rgba(0, 229, 204, 0.05) 100%);
            border: 2px solid var(--primary-cyan);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
        }
        
        .countdown-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .countdown-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-cyan);
            font-family: 'Courier New', monospace;
        }
        
        .current-price-box {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .current-price-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .current-price-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent-red);
        }
        
        .bid-form {
            margin-bottom: 20px;
        }
        
        .bid-input-group {
            position: relative;
            margin-bottom: 16px;
        }
        
        .bid-input-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .bid-input {
            width: 100%;
            padding: 14px 16px;
            padding-left: 30px;
            background: var(--bg-darker);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            transition: var(--transition-fast);
        }
        
        .bid-input:focus {
            outline: none;
            border-color: var(--primary-cyan);
            box-shadow: 0 0 0 3px rgba(0, 229, 204, 0.2);
        }
        
        .bid-input-prefix {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            margin-top: 12px;
        }
        
        .bid-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }
        
        .bid-hint strong {
            color: var(--primary-cyan);
        }
        
        .btn-bid {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-cyan) 0%, var(--primary-cyan-dark) 100%);
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            color: var(--bg-dark);
            cursor: pointer;
            transition: var(--transition-normal);
        }
        
        .btn-bid:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 229, 204, 0.4);
        }
        
        .btn-bid:disabled {
            background: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
        }
        
        .bid-rules {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.8;
        }
        
        .bid-rules li {
            margin-bottom: 4px;
        }
        
        /* Winner banner */
        .winner-banner {
            background: linear-gradient(135deg, rgba(0, 229, 204, 0.2) 0%, rgba(0, 229, 204, 0.1) 100%);
            border: 2px solid var(--primary-cyan);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .winner-banner h3 {
            color: var(--primary-cyan);
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        .winner-banner p {
            color: var(--text-primary);
            font-size: 16px;
        }
        
        .winner-price {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-red);
            margin-top: 8px;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 32px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            animation: toastIn 0.3s ease;
        }
        
        .toast.success {
            background: rgba(0, 229, 204, 0.95);
            color: var(--bg-dark);
        }
        
        .toast.error {
            background: rgba(255, 107, 107, 0.95);
            color: white;
        }
        
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        @media (max-width: 900px) {
            .auction-detail-container {
                grid-template-columns: 1fr;
            }
            
            .bid-panel {
                position: static;
            }
        }
    </style>
<link rel="stylesheet" href="/css/ai-chat.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-container">
            <div class="header-left">
                <a href="index.html" class="back-link" style="color:var(--primary-cyan);text-decoration:none;display:flex;align-items:center;gap:8px;">

    <div class="auction-detail-page">
        <div class="auction-detail-container">
            <!-- 左侧主内容 -->
            <div class="auction-main" id="auctionMain">
                <div style="text-align:center;padding:60px;">
                    <div class="spinner" style="width:40px;height:40px;border:3px solid var(--border-color);border-top-color:var(--primary-cyan);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;"></div>
                    <p style="color:var(--text-muted);">加载竞价详情...</p>

            <!-- 右侧报价面板 -->
            <div class="bid-panel">
                <div class="bid-card" id="bidCard">

    <script src="auth-check.js"></script>
    <script src="auction-demo-data.js?v=20260715a"></script>
    <script>
        const API_BASE = (() => {
            const port = window.location.port;
            if (!port || port === '80' || port === '443' || port === '8081') return '/api/v1/auction';
            return 'http://' + window.location.hostname + ':8081/api/v1/auction';
        })();
        const DEPOSIT_API = (() => {
            const port = window.location.port;
            if (!port || port === '80' || port === '443' || port === '8081') return '/api/v1/auction/deposit';
            return 'http://' + window.location.hostname + ':8081/api/v1/auction/deposit';
        })();
        let auctionData = null;
        let myStatus = null;   // 当前用户在该竞价中的参与状态
        let countdownInterval = null;
        let supplierDepositPaid = false;
        let supplierVouchers = [];
        let selectedSupplierVoucherId = null;
        let stompClient = null; // WebSocket STOMP客户端

        function getAuthHeaders(json) {
            const token = localStorage.getItem('accessToken') || localStorage.getItem('token') || '';
            const h = {};
            if (token) h['Authorization'] = 'Bearer ' + token;
            if (json) h['Content-Type'] = 'application/json';
            return h;
        }
        
        document.addEventListener('DOMContentLoaded', loadAuctionDetail);
        
        async function loadAuctionDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const auctionId = urlParams.get('id');
            const demoKey = urlParams.get('demo');

            if (demoKey) {
                auctionData = window.YICAI_AUCTION_DEMO && window.YICAI_AUCTION_DEMO.getByKey(demoKey);
                if (!auctionData) {
                    showError('演示场景不存在');
                    return;
                }
                renderAuctionDetail();
                renderBidPanel();
                startCountdown();
                return;
            }
            
            if (!auctionId) {
                showError('竞价ID不存在');
                return;
            }
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                const response = await fetch(`${API_BASE}/${auctionId}`, { signal: controller.signal });
                clearTimeout(timeoutId);
                const result = await response.json();
                
                if (result.code === 200) {
                    auctionData = result.data;
                    await loadMyStatus(auctionId);
                    renderAuctionDetail();
                    renderBidPanel();
                    startCountdown();
                    connectWebSocket(auctionId);
                    return;
                }
            } catch (error) {
                console.error('加载竞价详情失败:', error);
            }

            showError('竞价不存在或服务暂时不可用');
        }

        async function loadMyStatus(auctionId) {
            try {
                const token = localStorage.getItem('accessToken') || localStorage.getItem('token') || '';
                if (!token) return;
                const r = await fetch(`${API_BASE}/${auctionId}/my-status`, { headers: getAuthHeaders(false) });
                const res = await r.json();
                if (res.code === 200) myStatus = res.data;
            } catch(e) { /* 未登录或接口异常 */ }
        }
        
        function renderAuctionDetail() {
            const main = document.getElementById('auctionMain');
            const a = auctionData;
            
            main.innerHTML = `
                ${a.demo ? `<div style="margin-bottom:18px;padding:14px 16px;border:1px solid rgba(0,229,204,.35);background:rgba(0,229,204,.08);border-radius:10px;color:var(--text-secondary);line-height:1.7;"><strong style="color:var(--primary-cyan);">交互演示</strong>：这是用于讲解跨境电子反拍的模拟项目，不是真实订单、报价或成交业绩。</div>` : ''}
                <div class="auction-header">
                    <div>
                        <span class="auction-badge ${safeCssClass(a.status)}">${escapeHtml(a.statusText || '')}</span>
                        ${a.demo ? '<span style="display:inline-block;margin-left:8px;padding:4px 9px;border-radius:999px;background:rgba(139,92,246,.18);color:#c4b5fd;font-size:11px;font-weight:700;">DEMO</span>' : ''}
                        <h1 class="auction-detail-title">${escapeHtml(a.productName)}</h1>
                        <p class="auction-no">竞价编号: ${escapeHtml(a.auctionNo || '-')} | 采购主体: ${escapeHtml(a.buyerCompany || '易采贸易')}${a.customerMarket ? ` | 客户市场: ${escapeHtml(a.customerMarket)}` : ''}</p>
                    </div>
                </div>
                
                <div class="auction-meta">
                    <div class="meta-item">
                        <div class="meta-label">采购数量</div>
                        <div class="meta-value">${escapeHtml(String(a.quantity == null ? '-' : a.quantity))} ${escapeHtml(a.unit || '件')}</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">起拍价(最高限价)</div>
                        <div class="meta-value price">${formatMoney(a.startingPrice, a.currency)}</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">最低降价幅度</div>
                        <div class="meta-value">${formatMoney(a.minDecrement, a.currency)}</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">竞价时间</div>
                        <div class="meta-value" style="font-size:14px;">${formatDateTime(a.startTime)} ~ ${formatDateTime(a.endTime)}</div>
                    </div>
                </div>
                
                ${a.specification ? `
                <div class="auction-desc">
                    <h3 data-i18n="auctionDetail.t9ay5qk">产品规格说明</h3>
                    <p style="white-space:pre-line">${escapeHtml(a.specification)}</p>
                </div>
                ` : ''}
                
                ${a.deliveryAddress ? `
                <div class="auction-desc">
                    <h3 data-i18n="auctionDetail.tai56nl">交货信息</h3>
                    <p>交货地址: ${escapeHtml(a.deliveryAddress)}</p>
                    ${a.requiredDeliveryDate ? `<p>要求交货日期: ${escapeHtml(a.requiredDeliveryDate)}</p>` : ''}
                </div>
                ` : ''}
                
                ${a.paymentTerms ? `
                <div class="auction-desc">
                    <h3 data-i18n="auctionDetail.tae7ae4">付款方式</h3>
                    <p>${escapeHtml(a.paymentTerms)}</p>
                </div>
                ` : ''}
                
                <div class="bid-history">
                    <h3 data-i18n="auctionDetail.taogqle">报价记录 <span class="bid-count-badge">${Number(a.bidCount) || 0}次</span></h3>
                    <div class="bid-list" id="bidList">
                        ${renderBidList(a.bids)}
                    </div>
                </div>
            `;
        }
        
        function renderBidList(bids) {
            if (!bids || bids.length === 0) {
                return '<p style="text-align:center;color:var(--text-muted);padding:40px;">暂无报价记录，成为第一个报价的供应商！</p>';
            }
            
            return bids.map((bid, index) => `
                <div class="bid-item ${bid.isWinner ? 'winner' : ''} ${bid.isLowest ? 'lowest' : ''}">
                    <div class="bid-info">
                        <span class="bid-company">${escapeHtml(bid.supplierCompany || '供应商' + bid.supplierId)}</span>
                        <span class="bid-time">${formatDateTime(bid.createdAt)}</span>
                        ${bid.isWinner ? '<span class="bid-rank" style="color:#FFD93D;">🏆 中标</span>' : ''}
                        ${bid.isLowest && !bid.isWinner ? '<span class="bid-rank">当前最低</span>' : ''}
                    </div>
                    <div style="text-align:right;">
                        <div class="bid-price">${formatMoney(bid.bidPrice, auctionData && auctionData.currency)}</div>
                        <div style="font-size:11px;color:var(--text-muted);">第${Number(bid.bidSequence) || 0}次报价</div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderBidPanel() {
            const panel = document.getElementById('bidCard');
            const a = auctionData;
            const ms = myStatus || {};
            const isBuyer = ms.isBuyer === true;
            const isWinner = ms.isWinner === true;
            const userHasSignup = ms.hasSignup === true || a.hasSignup === true;

            if (a.demo) {
                panel.innerHTML = `
                    <div style="padding:6px 0 14px;">
                        <div style="display:inline-flex;padding:4px 9px;border-radius:999px;background:rgba(139,92,246,.18);color:#c4b5fd;font-size:11px;font-weight:700;margin-bottom:12px;">GUIDED DEMO</div>
                        <h3 style="margin:0 0 10px;color:var(--text-primary);">同口径反拍流程</h3>
                        <p style="color:var(--text-muted);line-height:1.65;margin:0 0 16px;">供应商仅看到统一规格、数量、交期和贸易条款；身份以匿名别名展示。易采会同时评审价格、合规、样品和交期，不把最低价自动等同于中标。</p>
                        <ol style="padding-left:20px;color:var(--text-secondary);line-height:1.9;margin:0 0 18px;">
                            <li>冻结规格、检验标准与报价口径</li>
                            <li>邀请通过初审的供应商报名</li>
                            <li>匿名限时降价，临近结束可自动延时</li>
                            <li>综合评审后由易采签发采购订单</li>
                        </ol>
                        <div style="padding:12px;border-radius:8px;background:rgba(0,229,204,.07);color:var(--text-secondary);margin-bottom:14px;">当前演示最低价：<strong style="color:var(--primary-cyan);">${formatMoney(a.currentLowestPrice || a.startingPrice, a.currency)}</strong><br><span style="font-size:12px;">报价口径：${escapeHtml(a.deliveryAddress || '以项目说明为准')}</span></div>
                        <a href="auction-create.html?template=${encodeURIComponent(a.demoKey)}" class="btn-bid" style="display:block;text-align:center;text-decoration:none;">用此场景创建需求</a>
                    </div>`;
                return;
            }

            // ========== 已废选 VOIDED ==========
            if (a.status === 'VOIDED') {
                panel.innerHTML = `
                    <div class="winner-banner" style="border-color:var(--accent-red);">
                        <h3 style="color:var(--accent-red);">竞价已废选</h3>
                        <p style="color:var(--text-muted);">本次竞价已被废选，所有押金将自动退还。</p>
                    </div>
                    ${isBuyer ? `
                    <button class="btn-bid" onclick="reAuction()" style="margin-top:16px;background:var(--primary-cyan);">重新竞价</button>
                    ` : ''}
                    <div class="bid-rules"><p data-i18n="auctionDetail.t7p1c4g">如有疑问请联系平台客服。</p></div>
                `;
                return;
            }

            // ========== 已取消 CANCELLED ==========
            if (a.status === 'CANCELLED') {
                panel.innerHTML = `
                    <div class="winner-banner" style="border-color:var(--text-muted);">
                        <h3 style="color:var(--text-muted);">竞价已取消</h3>
                        <p style="color:var(--text-muted);">采购商已取消本次竞价。</p>
                    </div>
                    ${isBuyer ? `
                    <button class="btn-bid" onclick="reAuction()" style="margin-top:16px;background:var(--primary-cyan);">重新竞价</button>
                    ` : ''}
                `;
                return;
            }

            // ========== 已流标 FAILED ==========
            if (a.status === 'FAILED') {
                panel.innerHTML = `
                    <div class="winner-banner" style="border-color:var(--accent-yellow);">
                        <h3 style="color:var(--accent-yellow);">竞价流标</h3>
                        <p style="color:var(--text-muted);">参与供应商不足或无有效报价，本次竞价流标。</p>
                    </div>
                    ${isBuyer ? `
                    <button class="btn-bid" onclick="reAuction()" style="margin-top:16px;background:var(--primary-cyan);">重新竞价</button>
                    ` : ''}
                    <div class="bid-rules"><p data-i18n="auctionDetail.toslzgk">所有押金将自动退还。</p></div>
                `;
                return;
            }

            // ========== 履约中 DELIVERING ==========
            if (a.status === 'DELIVERING') {
                panel.innerHTML = `
                    <div class="winner-banner">
                        <h3 data-i18n="auctionDetail.tbds09z">订单履约中</h3>
                        <p>中标供应商: ${escapeHtml(a.winnerCompany || '')}</p>
                        <div class="winner-price">${formatMoney(a.winningPrice, a.currency)}</div>
                    </div>
                    ${a.orderId ? `
                    <a href="order-detail.html?id=${a.orderId}" class="btn-bid" style="display:block;text-align:center;margin-top:16px;text-decoration:none;background:var(--primary-cyan);">查看订单详情</a>
                    ` : ''}
                    ${a.contractId ? `
                    <a href="contract-detail.html?id=${a.contractId}" style="display:block;text-align:center;margin-top:8px;color:var(--primary-cyan);font-size:13px;">查看合同</a>
                    ` : ''}
                `;
                return;
            }

            // ========== 已完成 COMPLETED ==========
            if (a.status === 'COMPLETED') {
                panel.innerHTML = `
                    <div class="winner-banner" style="border-color:var(--primary-cyan);">
                        <h3 style="color:var(--primary-cyan);">竞价已完成</h3>
                        <p>中标供应商: ${escapeHtml(a.winnerCompany || '')}</p>
                        <div class="winner-price">${formatMoney(a.winningPrice, a.currency)}</div>
                    </div>
                    ${a.orderId ? `
                    <a href="order-detail.html?id=${a.orderId}" class="btn-bid" style="display:block;text-align:center;margin-top:16px;text-decoration:none;background:var(--primary-cyan);">查看订单详情</a>
                    ` : ''}
                    <div class="bid-rules" style="margin-top:16px;"><p data-i18n="auctionDetail.tfv04nu">本次竞价已圆满完成，感谢参与。</p></div>
                `;
                return;
            }

            // ========== 已结束 ENDED ==========
            if (a.status === 'ENDED') {
                panel.innerHTML = `
                    ${a.winnerSupplierId ? `
                    <div class="winner-banner">
                        <h3 data-i18n="auctionDetail.tsysbcb">竞价已结束</h3>
                        <p>中标供应商: ${escapeHtml(a.winnerCompany || '供应商' + a.winnerSupplierId)}</p>
                        <div class="winner-price">${formatMoney(a.winningPrice, a.currency)}</div>
                    </div>
                    ` : `
                    <div class="winner-banner" style="border-color:var(--text-muted);">
                        <h3 style="color:var(--text-muted);">竞价已结束</h3>
                        <p style="color:var(--text-muted);">无供应商报价</p>
                    </div>
                    `}
                    <div class="bid-rules"><p data-i18n="auctionDetail.tbcafvr">本次竞价已结束，感谢参与。</p></div>
                `;
                return;
            }

            // ========== 已确认 CONFIRMED (双方已确认，订单已生成) ==========
            if (a.status === 'CONFIRMED') {
                panel.innerHTML = `
                    <div class="winner-banner" style="border-color:var(--primary-cyan);">
                        <h3 style="color:var(--primary-cyan);">双方已确认</h3>
                        <p>中标供应商: ${escapeHtml(a.winnerCompany || '')}</p>
                        <div class="winner-price">${formatMoney(a.winningPrice, a.currency)}</div>
                        <p style="font-size:12px;color:var(--text-muted);margin-top:8px;">订单与合同已自动生成</p>
                    </div>
                    ${a.orderId ? `
                    <a href="order-detail.html?id=${a.orderId}" class="btn-bid" style="display:block;text-align:center;margin-top:16px;text-decoration:none;background:var(--primary-cyan);">查看订单</a>
                    ` : ''}
                    ${a.contractId ? `
                    <a href="contract-detail.html?id=${a.contractId}" style="display:block;text-align:center;margin-top:8px;color:var(--primary-cyan);font-size:13px;">查看合同</a>
                    ` : ''}
                `;
                return;
            }

            // ========== 待确认 CONFIRMING (核心交互状态) ==========
            if (a.status === 'CONFIRMING') {
                // 确认截止倒计时
                let confirmCountdown = '';
                if (a.confirmDeadline) {
                    const deadline = new Date(a.confirmDeadline);
                    const remaining = Math.max(0, Math.floor((deadline - Date.now()) / 1000));
                    confirmCountdown = `
                    <div class="countdown-box" style="margin-bottom:16px;">
                        <div class="countdown-label">确认截止倒计时</div>
                        <div class="countdown-value" id="confirmCountdown">${formatCountdown(remaining)}</div>
                        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">超时未确认将自动废选</div>
                    </div>`;
                }

                // 确认状态
                const confirmStatus = `
                <div style="margin:16px 0;padding:16px;background:rgba(0,229,204,0.06);border-radius:12px;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                        <span style="color:var(--text-muted);">采购商</span>
                        <span style="font-weight:600;color:${a.buyerConfirmed ? 'var(--primary-cyan)' : 'var(--accent-yellow)'};">
                            ${a.buyerConfirmed ? '&#10004; 已确认' : '&#9203; 待确认'}
                            ${a.buyerConfirmedAt ? '<br><span style="font-size:11px;color:var(--text-muted);">' + formatDateTime(a.buyerConfirmedAt) + '</span>' : ''}
                        </span>
                    </div>
                    <div style="display:flex;justify-content:space-between;">
                        <span style="color:var(--text-muted);">供应商</span>
                        <span style="font-weight:600;color:${a.supplierConfirmed ? 'var(--primary-cyan)' : 'var(--accent-yellow)'};">
                            ${a.supplierConfirmed ? '&#10004; 已确认' : '&#9203; 待确认'}
                            ${a.supplierConfirmedAt ? '<br><span style="font-size:11px;color:var(--text-muted);">' + formatDateTime(a.supplierConfirmedAt) + '</span>' : ''}
                        </span>
                    </div>
                </div>`;

                // 操作按钮 - 根据角色显示
                let actionButtons = '';
                if (isBuyer && !a.buyerConfirmed) {
                    actionButtons = `
                    <div style="display:flex;gap:8px;margin-top:16px;">
                        <button class="btn-bid" onclick="buyerConfirmResult()" style="flex:2;">确认中标结果</button>
                        <button class="btn-bid" onclick="buyerRejectResult()" style="flex:1;background:var(--accent-red);">拒绝</button>
                    </div>`;
                } else if (isBuyer && a.buyerConfirmed) {
                    actionButtons = `<p style="text-align:center;color:var(--primary-cyan);margin-top:16px;font-weight:600;">您已确认，等待供应商确认</p>`;
                }
                if (isWinner && !a.supplierConfirmed) {
                    actionButtons = `
                    <div style="display:flex;gap:8px;margin-top:16px;">
                        <button class="btn-bid" onclick="supplierConfirmResult()" style="flex:2;">确认中标</button>
                        <button class="btn-bid" onclick="supplierRejectResult()" style="flex:1;background:var(--accent-red);">拒绝</button>
                    </div>`;
                } else if (isWinner && a.supplierConfirmed) {
                    actionButtons = `<p style="text-align:center;color:var(--primary-cyan);margin-top:16px;font-weight:600;">您已确认，等待采购商确认</p>`;
                }
                if (!isBuyer && !isWinner) {
                    actionButtons = `<p style="text-align:center;color:var(--text-muted);margin-top:16px;">等待双方确认结果</p>`;
                }

                panel.innerHTML = `
                    <div class="winner-banner">
                        <h3 data-i18n="auctionDetail.tew1lkx">等待双方确认</h3>
                        <p>中标供应商: ${escapeHtml(a.winnerCompany || '供应商' + a.winnerSupplierId)}</p>
                        <div class="winner-price">${formatMoney(a.winningPrice, a.currency)}</div>
                    </div>
                    ${confirmCountdown}
                    ${confirmStatus}
                    ${actionButtons}
                `;
                // 启动确认截止倒计时
                if (a.confirmDeadline) startConfirmCountdown(a.confirmDeadline);
                return;
            }

            // ========== 草稿/待审核/已审核 ==========
            if (a.status === 'DRAFT' || a.status === 'PENDING_APPROVAL') {
                panel.innerHTML = `
                    <div class="winner-banner" style="border-color:var(--text-muted);">
                        <h3 style="color:var(--text-muted);">${a.status === 'DRAFT' ? '草稿' : '待审核'}</h3>
                        <p style="color:var(--text-muted);">${a.status === 'DRAFT' ? '采购商尚未提交审核' : '等待管理员审核通过'}</p>
                    </div>
                `;
                return;
            }

            // ========== 报名中状态 ==========
            if (a.status === 'SIGNUP' || a.status === 'APPROVED') {
                const signedUp = userHasSignup;
                panel.innerHTML = `
                    <div class="countdown-box">
                        <div class="countdown-label">距报名截止</div>
                        <div class="countdown-value" id="countdown">${formatCountdown(a.remainingSeconds)}</div>
                    </div>
                    
                    <div class="signup-info" style="margin:20px 0;padding:16px;background:rgba(0,229,204,0.1);border-radius:12px;">
                        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                            <span style="color:var(--text-muted);">已报名供应商</span>
                            <span style="color:var(--primary-cyan);font-weight:600;">${a.signupCount || 0} 家</span>
                        </div>
                        <div style="display:flex;justify-content:space-between;">
                            <span style="color:var(--text-muted);">最少参与要求</span>
                            <span style="color:var(--text-primary);">${a.minParticipants || 3} 家</span>
                        </div>
                    </div>
                    
                    <div class="price-info" style="margin-bottom:20px;">
                        <div class="current-price-label">最高限价</div>
                        <div class="current-price-value">${formatMoney(a.startingPrice, a.currency)}</div>
                    </div>
                    
                    ${signedUp ? `
                    <div class="signup-success" style="text-align:center;padding:20px;background:rgba(0,229,204,0.1);border-radius:12px;margin-bottom:16px;">
                        <span style="font-size:32px;">&#10004;</span>
                        <p style="color:var(--primary-cyan);font-weight:600;margin-top:8px;">您已成功报名</p>
                        <p style="color:var(--text-muted);font-size:12px;margin-top:4px;">请在竞价开始后参与出价</p>
                    </div>
                    ` : `
                    <div id="supplierDepositSection" style="margin-bottom:16px;padding:16px;background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.3);border-radius:12px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                            <span style="font-size:14px;font-weight:600;color:var(--text-primary);">竞价押金: <span id="supplierDepositAmt" style="color:#8B5CF6;">$10.00</span> USD</span>
                            <span id="supplierDepositStatus" style="font-size:12px;color:var(--text-muted);">未缴纳</span>
                        </div>
                        <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">当前仅支持有效抵用券或平台人工审核；在线押金通道完成持牌支付接入前不会生成“已支付”记录。</p>
                        <div id="supplierVoucherList" style="margin-bottom:10px;"></div>
                        <div style="display:flex;gap:8px;">
                            <button class="btn-bid" id="btnPaySupplierDeposit" onclick="paySupplierDeposit()" disabled title="在线押金支付尚未接入" style="flex:1;padding:10px;font-size:14px;background:#2a3441;color:#8b9cb5;cursor:not-allowed;">在线支付待接入</button>
                            <button id="btnPaySupplierVoucher" onclick="paySupplierDepositWithVoucher()" style="flex:1;padding:10px;background:#8B5CF6;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">用抵用券</button>
                        </div>
                    </div>
                    <button class="btn-bid" onclick="signupAuction()" id="btnSignup" disabled title="请先缴纳竞价押金">缴纳押金后报名</button>
                    `}
                    
                    <ul class="bid-rules" style="margin-top:20px;">
                        <li data-i18n="auctionDetail.t1td17y">须缴纳竞价押金后方可报名</li>
                        <li data-i18n="auctionDetail.tk96473">报名后方可参与竞价</li>
                        <li>报名人数不足${a.minParticipants || 3}家将流标</li>
                        <li>竞价开始时间: ${formatDateTime(a.startTime)}</li>
                    </ul>
                `;
                if (!signedUp) loadSupplierDepositInfo();
                return;
            }

            // ========== 待开始 PENDING ==========
            if (a.status === 'PENDING') {
                panel.innerHTML = `
                    <div class="countdown-box">
                        <div class="countdown-label">距竞价开始</div>
                        <div class="countdown-value" id="countdown">${formatCountdown(a.remainingSeconds)}</div>
                    </div>
                    
                    <div class="current-price-box">
                        <div class="current-price-label">最高限价</div>
                        <div class="current-price-value">${formatMoney(a.startingPrice, a.currency)}</div>
                    </div>
                    
                    <button class="btn-bid" disabled>竞价尚未开始</button>
                    
                    <ul class="bid-rules" style="margin-top:20px;">
                        <li data-i18n="auctionDetail.tz5w0xe">竞价开始后可参与出价</li>
                        <li data-i18n="auctionDetail.tugsqoy">价低者得，出价不可撤销</li>
                    </ul>
                `;
                return;
            }
            
            // ========== 竞价中 ACTIVE ==========
            const maxBid = a.currentLowestPrice ? 
                parseFloat(a.currentLowestPrice) - parseFloat(a.minDecrement || 1) : 
                parseFloat(a.startingPrice);

            // 供应商排名信息
            let rankingHtml = '';
            if (ms.hasBid && a.showRanking) {
                rankingHtml = `
                <div id="myRankingBox" style="margin:12px 0;padding:12px;background:rgba(0,229,204,0.08);border-radius:10px;display:flex;justify-content:space-between;align-items:center;">
                    <span style="color:var(--text-muted);font-size:13px;">我的排名</span>
                    <span id="myRankingValue" style="font-weight:700;color:var(--primary-cyan);font-size:16px;">加载中...</span>
                </div>`;
            }
            
            panel.innerHTML = `
                <div class="countdown-box">
                    <div class="countdown-label">距竞价结束 ${a.currentExtensions > 0 ? '<span style="color:var(--accent-yellow);font-size:11px;">(已延时' + a.currentExtensions + '次)</span>' : ''}</div>
                    <div class="countdown-value" id="countdown">${formatCountdown(a.remainingSeconds)}</div>
                </div>
                
                <div class="current-price-box">
                    <div class="current-price-label">当前最低出价</div>
                    <div class="current-price-value" id="currentPrice">${formatMoney(a.currentLowestPrice || a.startingPrice, a.currency)}</div>
                </div>
                ${rankingHtml}
                
                <form class="bid-form" onsubmit="submitBid(event)">
                    <div class="bid-input-group">
                        <label data-i18n="auctionDetail.ttjw7yy">您的出价 (单价)</label>
                        <span class="bid-input-prefix">${currencySymbol(a.currency)}</span>
                        <input type="number" class="bid-input" id="bidPrice" step="0.01" max="${maxBid.toFixed(2)}" placeholder="输入出价金额" required>
                        <div class="bid-hint">出价必须 ≤ <strong>${formatMoney(maxBid, a.currency)}</strong>（降幅 ≥ ${formatMoney(a.minDecrement, a.currency)}）</div>
                    </div>
                    <button type="submit" class="btn-bid" id="btnBid">立即出价</button>
                </form>
                
                <ul class="bid-rules" style="margin-top:20px;">
                    <li data-i18n="auctionDetail.tiro5qa">反拍规则：价低者得，出价必须低于当前最低价</li>
                    <li data-i18n="auctionDetail.ta0afx7">出价不可撤销，请谨慎操作</li>
                    <li>结束前${a.extensionTriggerMinutes || 5}分钟内有新报价将自动延时${a.extensionMinutes || 5}分钟</li>
                </ul>
            `;
            // 加载排名
            if (ms.hasBid && a.showRanking) loadMyRanking();
        }
        
        // ========== 供应商押金 ==========
        async function loadSupplierDepositInfo() {
            try {
                const r1 = await fetch(`${DEPOSIT_API}/admin/config`, {headers: getAuthHeaders(false)});
                const res1 = await r1.json();
                if (res1.code === 200 && res1.data) {
                    for (const c of res1.data) {
                        if (c.key === 'SUPPLIER_DEPOSIT_AMOUNT') {
                            const el = document.getElementById('supplierDepositAmt');
                            if (el) el.textContent = '$' + parseFloat(c.value).toFixed(2);
                        }
                    }
                }
            } catch(e) {}
            try {
                const r2 = await fetch(`${DEPOSIT_API}/vouchers/my?voucherType=SUPPLIER_DEPOSIT`, {headers: getAuthHeaders(false)});
                const res2 = await r2.json();
                if (res2.code === 200 && res2.data) {
                    supplierVouchers = res2.data;
                    renderSupplierVouchers();
                }
            } catch(e) {}
            // 检查是否已缴纳
            if (auctionData && auctionData.id) {
                try {
                    const r3 = await fetch(`${DEPOSIT_API}/check?auctionId=${auctionData.id}`, {headers: getAuthHeaders(false)});
                    const res3 = await r3.json();
                    if (res3.code === 200 && res3.data && res3.data.hasPaid) {
                        supplierDepositPaid = true;
                        updateSupplierDepositUI();
                    }
                } catch(e) {}
            }
        }

        function renderSupplierVouchers() {
            const container = document.getElementById('supplierVoucherList');
            if (!container) return;
            if (!supplierVouchers || supplierVouchers.length === 0) {
                container.innerHTML = '<p style="font-size:11px;color:var(--text-muted);">暂无可用抵用券</p>';
                const btn = document.getElementById('btnPaySupplierVoucher');
                if (btn) btn.style.display = 'none';
                return;
            }
            let html = '<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;">可用抵用券 (' + supplierVouchers.length + '张):</div>';
            html += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
            for (const v of supplierVouchers) {
                const sel = (selectedSupplierVoucherId === v.id) ? 'border-color:#8B5CF6;background:rgba(139,92,246,0.15);' : '';
                html += `<div onclick="selectSupplierVoucher(${v.id})" style="cursor:pointer;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:11px;${sel}">`;
                html += `<span style="color:#8B5CF6;font-weight:600;">$${parseFloat(v.faceValue).toFixed(2)}</span>`;
                html += `<span style="color:var(--text-muted);margin-left:4px;">${v.voucherNo}</span>`;
                html += '</div>';
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function selectSupplierVoucher(id) {
            selectedSupplierVoucherId = (selectedSupplierVoucherId === id) ? null : id;
            renderSupplierVouchers();
        }

        function updateSupplierDepositUI() {
            const statusEl = document.getElementById('supplierDepositStatus');
            const btnPay = document.getElementById('btnPaySupplierDeposit');
            const btnVoucher = document.getElementById('btnPaySupplierVoucher');
            const btnSignup = document.getElementById('btnSignup');
            if (supplierDepositPaid) {
                if (statusEl) statusEl.innerHTML = '<span style="color:var(--primary-cyan);font-weight:600;">&#10003; 已缴纳</span>';
                if (btnPay) { btnPay.disabled = true; btnPay.textContent = '已缴纳'; btnPay.style.background = 'var(--border-color)'; btnPay.style.color = 'var(--text-muted)'; }
                if (btnVoucher) btnVoucher.style.display = 'none';
                if (btnSignup) { btnSignup.disabled = false; btnSignup.textContent = '立即报名'; btnSignup.title = ''; }
                const vl = document.getElementById('supplierVoucherList');
                if (vl) vl.innerHTML = '';
            }
        }

        async function paySupplierDeposit() {
            const btn = document.getElementById('btnPaySupplierDeposit');
            if (!btn || !auctionData) return;
            btn.disabled = true; btn.textContent = '处理中...';
            try {
                const r = await fetch(`${DEPOSIT_API}/supplier/pay?auctionId=${auctionData.id}`, { method:'POST', headers: getAuthHeaders(false) });
                const res = await r.json();
                if (res.code === 200) {
                    supplierDepositPaid = true;
                    updateSupplierDepositUI();
                    showToast(t('auction.msg.depositPaid'), 'success');
                } else { throw new Error(res.message || '缴纳失败'); }
            } catch(e) { showToast(e.message || '缴纳失败', 'error'); btn.disabled = false; btn.textContent = '缴纳押金'; }
        }

        async function paySupplierDepositWithVoucher() {
            if (!selectedSupplierVoucherId) { showToast(t('auction.msg.selectVoucher'), 'error'); return; }
            const btn = document.getElementById('btnPaySupplierVoucher');
            if (!btn || !auctionData) return;
            btn.disabled = true; btn.textContent = '处理中...';
            try {
                const r = await fetch(`${DEPOSIT_API}/supplier/pay?auctionId=${auctionData.id}&voucherId=${selectedSupplierVoucherId}`, { method:'POST', headers: getAuthHeaders(false) });
                const res = await r.json();
                if (res.code === 200) {
                    supplierDepositPaid = true;
                    selectedSupplierVoucherId = null;
                    updateSupplierDepositUI();
                    showToast(t('auction.msg.voucherPaid'), 'success');
                } else { throw new Error(res.message || '支付失败'); }
            } catch(e) { showToast(e.message || '使用抵用券失败', 'error'); btn.disabled = false; btn.textContent = '用抵用券'; }
        }

        // 供应商报名
        async function signupAuction() {
            if (!supplierDepositPaid) { showToast(t('auction.msg.payDepositFirst'), 'error'); return; }
            const btn = document.getElementById('btnSignup');
            if (!btn) return;
            btn.disabled = true;
            btn.textContent = '报名中...';
            try {
                const response = await fetch(`${API_BASE}/${auctionData.id}/signup`, {
                    method: 'POST',
                    headers: getAuthHeaders(true)
                });
                const result = await response.json();
                if (result.code === 200) {
                    showToast(t('auction.msg.registerSuccess'), 'success');
                    setTimeout(() => loadAuctionDetail(), 1000);
                } else {
                    showToast(result.message || '报名失败', 'error');
                    btn.disabled = false;
                    btn.textContent = '立即报名';
                }
            } catch (error) {
                console.error('报名失败:', error);
                showToast(t('common.networkRetry'), 'error');
                btn.disabled = false;
                btn.textContent = '立即报名';
            }
        }
        
        async function submitBid(event) {
            event.preventDefault();
            
            const bidPrice = parseFloat(document.getElementById('bidPrice').value);
            if (!bidPrice || bidPrice <= 0) {
                showToast(t('auction.msg.invalidBid'), 'error');
                return;
            }
            
            const btn = document.getElementById('btnBid');
            btn.disabled = true;
            btn.textContent = '提交中...';
            
            try {
                const response = await fetch(`${API_BASE}/bid`, {
                    method: 'POST',
                    headers: getAuthHeaders(true),
                    body: JSON.stringify({
                        auctionId: auctionData.id,
                        bidPrice: bidPrice
                    })
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    showToast(t('auction.msg.bidSuccess'), 'success');
                    // 刷新页面数据
                    setTimeout(() => loadAuctionDetail(), 1000);
                } else {
                    showToast(result.message || '出价失败', 'error');
                }
            } catch (error) {
                console.error('出价失败:', error);
                showToast(t('common.networkRetry'), 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '立即出价';
            }
        }
        
        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            
            let seconds = auctionData.remainingSeconds || 0;
            
            countdownInterval = setInterval(() => {
                if (seconds > 0) {
                    seconds--;
                    const el = document.getElementById('countdown');
                    if (el) el.textContent = formatCountdown(seconds);
                } else {
                    clearInterval(countdownInterval);
                    // 自动刷新页面
                    setTimeout(() => loadAuctionDetail(), 2000);
                }
            }, 1000);
        }
        
        function formatPrice(price) {
            if (!price) return '0.00';
            return parseFloat(price).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
        
        function formatCountdown(seconds) {
            if (!seconds || seconds <= 0) return '已结束';
            
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            if (days > 0) {
                return `${days}天 ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function currencySymbol(currency) {
            if (window.YICAI_AUCTION_DEMO) return window.YICAI_AUCTION_DEMO.symbol(currency || 'CNY');
            return ({ USD: '$', EUR: '€', GBP: '£', JPY: '¥', CNY: '¥' })[currency] || (currency || 'CNY') + ' ';
        }

        function formatMoney(price, currency) {
            if (window.YICAI_AUCTION_DEMO) return window.YICAI_AUCTION_DEMO.money(price, currency || 'CNY');
            return currencySymbol(currency) + formatPrice(price);
        }

        function safeCssClass(value) {
            return String(value || '').toLowerCase().replace(/[^a-z0-9_-]/g, '');
        }
        
        function showError(message) {
            document.getElementById('auctionMain').innerHTML = `
                <div style="text-align:center;padding:60px;">
                    <p style="color:var(--accent-red);font-size:18px;">${escapeHtml(message)}</p>
                    <a href="auction-list.html" style="color:var(--primary-cyan);margin-top:20px;display:inline-block;">返回竞价列表</a>
                </div>
            `;
        }
        
        function showToast(message, type) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        // ========== 确认/拒绝操作 ==========

        async function buyerConfirmResult() {
            if (!confirm(t('auction.confirm.award'))) return;
            try {
                const r = await fetch(`${API_BASE}/${auctionData.id}/buyer-confirm`, { method: 'POST', headers: getAuthHeaders(false) });
                const res = await r.json();
                if (res.code === 200) { showToast(t('auction.msg.confirmOk'), 'success'); setTimeout(() => loadAuctionDetail(), 1000); }
                else showToast(res.message || '操作失败', 'error');
            } catch(e) { showToast(t('common.networkError'), 'error'); }
        }

        async function buyerRejectResult() {
            const reason = prompt('请输入拒绝原因（可选）：');
            if (reason === null) return; // 用户取消
            try {
                const url = `${API_BASE}/${auctionData.id}/buyer-reject` + (reason ? `?reason=${encodeURIComponent(reason)}` : '');
                const r = await fetch(url, { method: 'POST', headers: getAuthHeaders(false) });
                const res = await r.json();
                if (res.code === 200) { showToast(t('auction.msg.rejected'), 'success'); setTimeout(() => loadAuctionDetail(), 1000); }
                else showToast(res.message || '操作失败', 'error');
            } catch(e) { showToast(t('common.networkError'), 'error'); }
        }

        async function supplierConfirmResult() {
            if (!confirm(t('auction.confirm.accept'))) return;
            try {
                const r = await fetch(`${API_BASE}/${auctionData.id}/supplier-confirm`, { method: 'POST', headers: getAuthHeaders(false) });

                else showToast(res.message || '操作失败', 'error');
            } catch(e) { showToast(t('common.networkError'), 'error'); }
        }

            if (reason === null) return;

                const url = `${API_BASE}/${auctionData.id}/supplier-reject` + (reason ? `?reason=${encodeURIComponent(reason)}` : '');

                const res = await r.json();

            } catch(e) { showToast(t('common.networkError'), 'error'); }
        }

        // ========== 重新竞价 ==========

        async function reAuction() {
            if (!confirm(t('auction.confirm.relaunch'))) return;
            try {
                const r = await fetch(`${API_BASE}/${auctionData.id}/re-auction`, { method: 'POST', headers: getAuthHeaders(false) });
                const res = await r.json();
                if (res.code === 200 && res.data) {
                    showToast(t('auction.msg.newCreated'), 'success');
                    setTimeout(() => window.location.href = `auction-detail.html?id=${res.data.id}`, 1500);
                } else showToast(res.message || '操作失败', 'error');
            } catch(e) { showToast(t('common.networkError'), 'error'); }
        }

        // ========== 排名查询 ==========

        async function loadMyRanking() {
            try {
                const r = await fetch(`${API_BASE}/${auctionData.id}/my-ranking`, { headers: getAuthHeaders(false) });
                const res = await r.json();
                if (res.code === 200 && res.data) {
                    const el = document.getElementById('myRankingValue');
                    if (!el) return;
                    const d = res.data;
                    if (d.rankingVisible && d.ranking != null) {
                        el.textContent = `第 ${d.ranking} 名 / 共 ${d.totalBidders} 家`;
                    } else if (!d.rankingVisible) {
                        el.textContent = '排名已隐藏';
                        el.style.color = 'var(--text-muted)';
                    } else {
                        el.textContent = '暂无排名';
                    }
                }
            } catch(e) { /* 排名加载失败不影响主流程 */ }
        }

        // ========== 确认截止倒计时 ==========

        function startConfirmCountdown(deadline) {
            const deadlineTime = new Date(deadline).getTime();
            const interval = setInterval(() => {
                const remaining = Math.max(0, Math.floor((deadlineTime - Date.now()) / 1000));
                const el = document.getElementById('confirmCountdown');
                if (el) el.textContent = formatCountdown(remaining);
                if (remaining <= 0) {
                    clearInterval(interval);
                    setTimeout(() => loadAuctionDetail(), 2000);
                }
            }, 1000);
        }

        // ========== WebSocket实时更新 ==========

        function connectWebSocket(auctionId) {
            // 检查SockJS和STOMP是否可用
            if (typeof SockJS === 'undefined' || typeof Stomp === 'undefined') {
                
                startPolling(auctionId);
                return;
            }
            try {
                const wsUrl = (location.protocol === 'https:' ? 'https://' : 'http://') + location.host + '/ws';
                const socket = new SockJS(wsUrl);
                stompClient = Stomp.over(socket);
                stompClient.debug = null; // 关闭调试日志

                stompClient.connect({}, function() {
                    // 订阅竞价频道
                    stompClient.subscribe('/topic/auction/' + auctionId, function(message) {
                        try {
                            const data = JSON.parse(message.body);
                            handleWebSocketMessage(data);
                        } catch(e) { console.warn('WebSocket消息解析失败', e); }
                    });
                    
                }, function() {
                    
                    startPolling(auctionId);
                });
            } catch(e) {
                
                startPolling(auctionId);
            }
        }

        function handleWebSocketMessage(data) {
            if (!auctionData) return;
            const type = data.type || data.event;

            if (type === 'BID_UPDATE') {
                // 实时更新出价信息
                if (data.currentLowestPrice) {
                    auctionData.currentLowestPrice = data.currentLowestPrice;
                    const priceEl = document.getElementById('currentPrice');
                    if (priceEl) priceEl.textContent = formatMoney(data.currentLowestPrice, auctionData.currency);
                }
                if (data.bidCount) auctionData.bidCount = data.bidCount;
                if (data.endTime) auctionData.endTime = data.endTime;
                if (data.currentExtensions != null) auctionData.currentExtensions = data.currentExtensions;
                // 刷新出价列表
                setTimeout(() => loadAuctionDetail(), 500);
            } else if (type === 'AUCTION_STATUS_UPDATE' || type === 'AUCTION_VOIDED' || type === 'AUCTION_CONFIRMED') {
                // 状态变更 - 完整刷新
                setTimeout(() => loadAuctionDetail(), 500);
            }
        }

        function startPolling(auctionId) {
            // ACTIVE状态下每10秒轮询一次
            if (auctionData && auctionData.status === 'ACTIVE') {
                setInterval(async () => {
                    try {
                        const r = await fetch(`${API_BASE}/${auctionId}`);
                        const res = await r.json();
                        if (res.code === 200) {
                            const newData = res.data;
                            // 检测价格或状态变化
                            if (newData.currentLowestPrice !== auctionData.currentLowestPrice ||
                                newData.status !== auctionData.status ||
                                newData.bidCount !== auctionData.bidCount) {
                                auctionData = newData;
                                renderAuctionDetail();
                                renderBidPanel();
                            }
                        }
                    } catch(e) { /* 轮询失败忽略 */ }
                }, 10000);
            }
        }
