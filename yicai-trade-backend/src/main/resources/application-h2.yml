# H2内存数据库开发配置
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:yicai_trade;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
  
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  
  sql:
    init:
      mode: always
      platform: h2
      encoding: UTF-8
  
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  
  flyway:
    enabled: false
  
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - com.alibaba.druid.spring.boot3.autoconfigure.DruidDataSourceAutoConfigure

logging:
  level:
    com.yicai.trade: DEBUG

# 仅用于本机 H2 演示环境；生产环境必须通过 JWT_SECRET 注入独立密钥。
jwt:
  secret: yicai-local-h2-development-secret-key-change-before-production-2026

management:
  health:
    redis:
      enabled: false
