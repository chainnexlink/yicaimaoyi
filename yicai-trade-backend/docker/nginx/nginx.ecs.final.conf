worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    upstream yicai_backend {
        server yicai-backend:8081;
        keepalive 32;
    }

    server {
        listen 80;
        server_name chainnexlink.com www.chainnexlink.com;

        location = /nginx-health {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }

        location / {
            return 301 https://chainnexlink.com$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name www.chainnexlink.com;
        ssl_certificate /etc/letsencrypt/live/chainnexlink.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/chainnexlink.com/privkey.pem;
        return 301 https://chainnexlink.com$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name chainnexlink.com;

        ssl_certificate /etc/letsencrypt/live/chainnexlink.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/chainnexlink.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:CHAINNEXLINK_SSL:10m;
        ssl_session_timeout 1d;

        root /usr/share/nginx/html;
        index index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location ^~ /app/ {
            alias /usr/share/nginx/html/app/;
            try_files $uri $uri/ /app/index.html;
        }

        location /api/v1/smart-match/ {
            proxy_pass http://yicai_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
        }

        location /api/ {
            proxy_pass http://yicai_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location /ws {
            proxy_pass http://yicai_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location /actuator/ {
            proxy_pass http://yicai_backend;
            proxy_set_header Host $host;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~ /\.(?!well-known) {
            deny all;
            return 404;
        }

        location ~ \.(env|yml|yaml|properties|sql|log)$ {
            deny all;
            return 404;
        }

        location ~* \.(jpg|jpeg|png|gif|ico|woff|woff2|ttf|svg)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        location ~* \.(css|js)$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
    }

    server {
        listen 80;
        server_name api.chainnexlink.com;

        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }

        location / {
            return 301 https://api.chainnexlink.com$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name api.chainnexlink.com;

        ssl_certificate /etc/letsencrypt/live/api.chainnexlink.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.chainnexlink.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:YICAI_API_SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location = /healthz {
            proxy_pass http://yicai_backend/actuator/health;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /actuator/ {
            return 404;
        }

        location / {
            proxy_pass http://yicai_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 60s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
        }
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name warrescue.com www.warrescue.com;

        location /.well-known/acme-challenge/ {
            root /var/www/warrescue;
        }

        location / {
            return 301 https://warrescue.com$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name www.warrescue.com;
        ssl_certificate /etc/letsencrypt/live/warrescue.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/warrescue.com/privkey.pem;
        return 301 https://warrescue.com$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name warrescue.com;

        ssl_certificate /etc/letsencrypt/live/warrescue.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/warrescue.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:WARRESCUE_SSL:10m;
        ssl_session_timeout 1d;

        root /var/www/warrescue;
        index index.html;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
