worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 文件上传大小限制 (与Spring Boot保持一致)
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    upstream backend {
        server 172.21.0.3:8081;
        keepalive 32;
    }

    # HTTP -> HTTPS 重定向
    server {
        listen 80;
        server_name chainnexlink.com www.chainnexlink.com;

        # Let's Encrypt 证书续期验证
        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }

        # 所有其他请求重定向到HTTPS
        location / {
            return 301 https://chainnexlink.com$request_uri;
        }
    }

    # www -> 非www 重定向
    server {
        listen 443 ssl;
        server_name www.chainnexlink.com;

        ssl_certificate /etc/letsencrypt/live/chainnexlink.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/chainnexlink.com/privkey.pem;

        return 301 https://chainnexlink.com$request_uri;
    }

    # HTTPS 主站
    server {
        listen 443 ssl;
        server_name chainnexlink.com;

        ssl_certificate /etc/letsencrypt/live/chainnexlink.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/chainnexlink.com/privkey.pem;

        # SSL 安全配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        root /usr/share/nginx/html;
        index index.html;

        # 安全响应头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;


        # Flutter App Web版
        location ^~ /app/ {
            alias /usr/share/nginx/html/app/;
            try_files $uri $uri/ /app/index.html;
            location ~* (\.(html)$|flutter_bootstrap\.js$|flutter_service_worker\.js$|main\.dart\.js$) {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires 0;
            }
        }

        # 前端静态文件
        location / {
            try_files $uri $uri/ /index.html;
            # HTML文件不缓存，确保每次获取最新版本
            location ~* \.html$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires 0;
            }
        }

        # API反向代理
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # AI智能匹配接口 (需要更长超时)
        location /api/v1/smart-match/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
        }

        # WebSocket代理
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Actuator健康检查 (仅内网访问)
        location /actuator/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
        }

        # 禁止访问隐藏文件和敏感文件 (排除.well-known用于SSL验证)
        location ~ /\.(?!well-known) {
            deny all;
            return 404;
        }
        location ~ \.(env|yml|yaml|properties|sql|log)$ {
            deny all;
            return 404;
        }

        # 静态资源缓存（图片字体长缓存，CSS/JS短缓存配合版本号）
        location ~* \.(jpg|jpeg|png|gif|ico|woff|woff2|ttf|svg)$ {
            expires 7d;
            add_header Cache-Control "public";
        }
        location ~* \.(css|js)$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
    }

    # ============================================
    # warrescue.com
    # ============================================

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name warrescue.com www.warrescue.com;

        location /.well-known/acme-challenge/ {
            root /var/www/warrescue;
        }

        location / {
            return 301 https://warrescue.com$request_uri;
        }
    }

    # www -> non-www redirect
    server {
        listen 443 ssl;
        http2 on;
        server_name www.warrescue.com;

        ssl_certificate /etc/letsencrypt/live/warrescue.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/warrescue.com/privkey.pem;

        return 301 https://warrescue.com$request_uri;
    }

    # HTTPS main
    server {
        listen 443 ssl;
        http2 on;
        server_name warrescue.com;

        ssl_certificate /etc/letsencrypt/live/warrescue.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/warrescue.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:WARRESCUE_SSL:10m;
        ssl_session_timeout 1d;

        root /var/www/warrescue;
        index index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            try_files $uri $uri/ /index.html;
            location ~* \.html$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires "0";
            }
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location ~ /\. {
            deny all;
            return 404;
        }
    }

}
